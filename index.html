<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Athanor Poétique</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; background: #0b0e14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f5f5f5; display: flex; justify-content: center; align-items: center;
        }

        /* --- ÉCRAN D'ACCUEIL --- */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0e14; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 0.6s ease;
        }
        #welcomeScreen h1 {
            font-family: 'Georgia', serif; font-size: 2.5rem; letter-spacing: 5px;
            margin-bottom: 30px; color: #e94560; text-transform: uppercase;
            text-align: center;
        }
        .btn-start {
            padding: 15px 40px; background: transparent; border: 1px solid #e94560;
            color: #e94560; cursor: pointer; border-radius: 50px; text-transform: uppercase;
            font-weight: bold; transition: 0.3s;
        }
        .btn-start:hover { background: #e94560; color: white; }

        /* --- CONTENEUR PRINCIPAL --- */
        .container {
            width: 95%; max-width: 550px; background: #1a1a1a;
            padding: 25px; border-radius: 12px; border: 1px solid #333;
            opacity: 0; transform: translateY(20px); transition: all 0.5s ease;
        }
        .container.active { opacity: 1; transform: translateY(0); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full { grid-column: span 2; }

        input, select, button { padding: 12px; border-radius: 6px; border: 1px solid #444; font-size: 0.9rem; outline: none; }
        input { background: #222; color: white; }
        select { background-color: #8b0000; color: white; border: 1px solid #ff4d4d; cursor: pointer; }

        .btn-forge {
            grid-column: span 2; margin-top: 10px; background: #e94560;
            color: white; border: none; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-forge:active { transform: scale(0.98); background: #ff5c77; }
        .btn-forge:disabled { background: #444; color: #888; cursor: not-allowed; }

        #poemDisplay {
            margin-top: 20px; padding: 20px; border-left: 3px solid #e94560;
            background: rgba(255,255,255,0.03); font-family: 'Georgia', serif;
            font-style: italic; white-space: pre-wrap; display: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <h1>L'ATHANOR POÉTIQUE</h1>
    <button class="btn-start" onclick="startApp()">Entrer</button>
</div>

<div class="container" id="mainContainer">
    <h1 style="text-align:center; margin-bottom:20px; font-weight: 300;">✒️ Poetix Pro</h1>
    <div class="controls">
        <input type="text" id="target" class="full" placeholder="À qui sont ces mots ?">
        <select id="themeSelect">
            <option value="amour">💖 Amour</option>
            <option value="romance">🌹 Romance</option>
            <option value="reve">✨ Rêve</option>
            <option value="espace">🚀 Espace</option>
            <option value="melancolie">🎻 Mélancolie</option>
        </select>
        <select id="length">
            <option value="2">2 Vers</option>
            <option value="4">4 Vers</option>
            <option value="8">8 Vers</option>
            <option value="16">16 Vers</option>
        </select>
        <button id="forgeBtn" class="btn-forge" onclick="generate()">Forger le poème</button>
    </div>
    <div id="poemDisplay"></div>
</div>

<script>
function startApp() {
    const ws = document.getElementById('welcomeScreen');
    ws.style.opacity = '0';
    setTimeout(() => {
        ws.style.display = 'none';
        document.getElementById('mainContainer').classList.add('active');
    }, 600);
}

const library = {
    themes: {
        amour: {
            i: ["Dans le silence,", "Sous l'éclat,", "Ici,", "Parfois,", "Soudain,", "Au creux de l'âme,", "D'un geste,", "Sans un mot,"],
            s: ["le cœur", "ton regard", "la passion", "l'étreinte", "ton souffle", "notre lien", "ton ombre", "chaque pensée"],
            a: ["avance en funambule", "dessine un secret", "traverse les nuits", "éclaire l'ombre", "vibre sous les heures", "tisse un espoir", "effleure l'instant", "brise les chaînes"],
            c: ["au fond des silences.", "comme un matin fragile.", "sur un fil de cristal.", "que la rosée traduit.", "dans l'écho des jours.", "pour l'éternité.", "où le temps s'arrête.", "en une danse infinie."]
        },
        romance: {
            i: ["Doucement,", "Sous la lune,", "À demi-mot,", "Lentement,"],
            s: ["le violon", "une promesse", "le désir", "ton sourire"],
            a: ["danse", "s'éveille", "chante", "s'illumine"],
            c: ["sous la soie.", "contre ton épaule.", "dans le velours du soir.", "comme un aveu."]
        },
        reve: {
            i: ["Dans le songe,", "Par-delà l'ombre,", "Aux confins,", "Éveillé,"],
            s: ["le nuage", "ton image", "le mirage", "l'esprit"],
            a: ["invente des cieux", "s'évapore", "dessine un monde", "flotte"],
            c: ["loin des regards.", "dans l'irréel.", "où tout s'efface.", "parmi les songes."]
        },
        espace: {
            i: ["Dans le vide,", "Parmi les comètes,", "Sous les nébuleuses,", "Loin d'ici,"],
            s: ["l'astre", "ton étoile", "le pulsar", "le cosmos"],
            a: ["brille", "gravite", "explose en silence", "voyage"],
            c: ["à l'infini.", "dans l'éternité noire.", "vers d'autres mondes.", "au-delà du temps."]
        },
        melancolie: {
            i: ["Sous la pluie,", "Dans la brume,", "Seul,", "Hélas,"],
            s: ["le chagrin", "le souvenir", "le passé", "mon âme"],
            a: ["efface l'heure", "s'égare", "pleure", "s'éteint"],
            c: ["dans l'oubli.", "sous les décombres.", "au gré du vent.", "sans laisser de trace."]
        }
    }
};

// Fonction pour piocher un élément sans répétition immédiate
function getUniqueRandom(arr, usedIndexes) {
    if (usedIndexes.length >= arr.length) usedIndexes.length = 0; // Reset si on a tout utilisé
    
    let randomIndex;
    do {
        randomIndex = Math.floor(Math.random() * arr.length);
    } while (usedIndexes.includes(randomIndex));
    
    usedIndexes.push(randomIndex);
    return arr[randomIndex];
}

function generate() {
    const btn = document.getElementById('forgeBtn');
    const target = document.getElementById('target').value;
    const themeKey = document.getElementById('themeSelect').value;
    const length = parseInt(document.getElementById('length').value);
    const theme = library.themes[themeKey];

    // Tableaux pour suivre les éléments déjà utilisés
    const used = { i: [], s: [], a: [], c: [] };

    let poem = "";
    if(target) {
        poem += `<span style="color:#e94560; font-weight:bold; font-style: normal;">À ${target},</span>\n\n`;
    }

    for(let i = 0; i < length; i++) {
        let partI = getUniqueRandom(theme.i, used.i);
        let partS = getUniqueRandom(theme.s, used.s);
        let partA = getUniqueRandom(theme.a, used.a);
        let partC = getUniqueRandom(theme.c, used.c);

        let line = `${partI} ${partS} ${partA} ${partC}`;
        poem += line + "\n";
        
        // Saut de ligne tous les 4 vers (strophes), mais pas à la fin
        if((i+1) % 4 === 0 && (i+1) !== length) poem += "\n";
    }

    const display = document.getElementById('poemDisplay');
    display.innerHTML = poem.trim();
    display.style.display = 'block';

    // Anti-spam de 5 secondes
    let timeLeft = 5;
    btn.disabled = true;
    const countdown = setInterval(() => {
        btn.innerText = `Attendez (${timeLeft}s)`;
        timeLeft--;
        if (timeLeft < 0) {
            clearInterval(countdown);
            btn.disabled = false;
            btn.innerText = "Forger le poème";
        }
    }, 1000);
}
</script>
</body>
</html>
